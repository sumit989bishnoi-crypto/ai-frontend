<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodeRescue — AI Bug Fixer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,300;0,400;0,500;0,700;1,400&family=Unbounded:wght@400;700;900&display=swap"
        rel="stylesheet" />
    <style>
        /* ── Variables ─────────────────────────────── */
        :root {
            --bg: #050708;
            --surface: #0b0e12;
            --surface2: #111419;
            --border: #1c2028;
            --border-glow: #2af59820;
            --accent: #2af598;
            --accent-dim: #1a9e63;
            --accent-glow: #2af59840;
            --red: #ff4560;
            --amber: #f5a623;
            --blue: #4fc3f7;
            --text: #d4dbe8;
            --text-muted: #4a5568;
            --text-dim: #8896a8;
            --mono: 'JetBrains Mono', monospace;
            --display: 'Unbounded', sans-serif;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--mono);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── Scanline overlay ──────────────────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg,
                    transparent,
                    transparent 2px,
                    rgba(0, 0, 0, .06) 2px,
                    rgba(0, 0, 0, .06) 4px);
            pointer-events: none;
            z-index: 999;
        }

        /* ── Noise texture ─────────────────────────── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 998;
            opacity: .4;
        }

        /* ── Glowing grid bg ───────────────────────── */
        .grid-bg {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(42, 245, 152, .025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(42, 245, 152, .025) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Page wrapper ──────────────────────────── */
        .page {
            position: relative;
            z-index: 1;
            max-width: 860px;
            margin: 0 auto;
            padding: 3rem 1.5rem 5rem;
        }

        /* ── Header ────────────────────────────────── */
        header {
            margin-bottom: 3.5rem;
            animation: fadeDown .6s ease both;
        }

        .header-meta {
            font-size: .65rem;
            letter-spacing: .2em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: .75rem;
            display: flex;
            align-items: center;
            gap: .5rem;
        }

        .header-meta::before {
            content: '';
            display: inline-block;
            width: 20px;
            height: 1px;
            background: var(--accent);
        }

        h1 {
            font-family: var(--display);
            font-size: clamp(2rem, 6vw, 3.5rem);
            font-weight: 900;
            line-height: 1;
            letter-spacing: -.02em;
            color: #fff;
        }

        h1 span {
            color: var(--accent);
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .tagline {
            margin-top: .75rem;
            font-size: .8rem;
            color: var(--text-muted);
            letter-spacing: .05em;
        }

        /* ── Panel ─────────────────────────────────── */
        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 1.25rem;
            animation: fadeUp .5s ease both;
        }

        .panel:nth-child(2) {
            animation-delay: .08s;
        }

        .panel:nth-child(3) {
            animation-delay: .16s;
        }

        .panel-bar {
            display: flex;
            align-items: center;
            gap: .6rem;
            padding: .75rem 1.25rem;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
        }

        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }

        .dot-red {
            background: #ff5f57;
        }

        .dot-amber {
            background: #febc2e;
        }

        .dot-green {
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent-glow);
        }

        .panel-title {
            font-size: .68rem;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--text-muted);
            margin-left: .25rem;
            flex: 1;
        }

        /* ── Language selector ─────────────────────── */
        .lang-row {
            display: flex;
            flex-wrap: wrap;
            gap: .4rem;
            padding: .9rem 1.25rem;
            border-bottom: 1px solid var(--border);
        }

        .lang-btn {
            font-family: var(--mono);
            font-size: .68rem;
            padding: .3em .75em;
            border-radius: 4px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all .15s;
            letter-spacing: .04em;
        }

        .lang-btn:hover {
            border-color: var(--accent-dim);
            color: var(--accent);
        }

        .lang-btn.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
            box-shadow: 0 0 10px var(--border-glow);
        }

        /* ── Textarea ──────────────────────────────── */
        .code-area {
            width: 100%;
            min-height: 220px;
            padding: 1.25rem;
            background: transparent;
            border: none;
            outline: none;
            resize: vertical;
            font-family: var(--mono);
            font-size: .82rem;
            line-height: 1.7;
            color: #c8f7dc;
            caret-color: var(--accent);
        }

        .code-area::placeholder {
            color: var(--text-muted);
        }

        /* ── Button ────────────────────────────────── */
        .btn-row {
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
        }

        .analyze-btn {
            width: 100%;
            padding: .85rem;
            font-family: var(--display);
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: var(--bg);
            background: var(--accent);
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all .2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: .6rem;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        .analyze-btn:hover:not(:disabled) {
            background: #3fffa8;
            box-shadow: 0 0 35px var(--accent-glow);
            transform: translateY(-1px);
        }

        .analyze-btn:disabled {
            opacity: .5;
            cursor: not-allowed;
            transform: none;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid rgba(0, 0, 0, .3);
            border-top-color: var(--bg);
            border-radius: 50%;
            animation: spin .7s linear infinite;
            display: none;
        }

        .analyze-btn.loading .spinner {
            display: block;
        }

        .analyze-btn.loading .btn-text::after {
            content: '...';
        }

        /* ── Divider ───────────────────────────────── */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: .5rem 0;
            color: var(--text-muted);
            font-size: .65rem;
            letter-spacing: .2em;
            text-transform: uppercase;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        /* ── Output ────────────────────────────────── */
        #outputSection {
            display: none;
        }

        #outputSection.visible {
            display: block;
            animation: fadeUp .4s ease both;
        }

        .explanation-box {
            padding: 1.1rem 1.25rem;
            background: rgba(255, 69, 96, .05);
            border-bottom: 1px solid rgba(255, 69, 96, .12);
        }

        .output-label {
            font-size: .6rem;
            letter-spacing: .18em;
            text-transform: uppercase;
            margin-bottom: .5rem;
            display: flex;
            align-items: center;
            gap: .4rem;
        }

        .label-bug {
            color: var(--red);
        }

        .label-fix {
            color: var(--accent);
        }

        .label-icon {
            font-size: .8rem;
        }

        #errorExplanation {
            font-size: .82rem;
            line-height: 1.7;
            color: #ffb3bf;
        }

        /* Fixed code block */
        .fixed-code-wrap {
            padding: 1.25rem;
            position: relative;
        }

        .copy-btn {
            position: absolute;
            top: 1.25rem;
            right: 1.25rem;
            font-family: var(--mono);
            font-size: .65rem;
            padding: .3em .75em;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--surface2);
            color: var(--text-muted);
            cursor: pointer;
            transition: all .15s;
            letter-spacing: .06em;
        }

        .copy-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .copy-btn.copied {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-glow);
        }

        #fixedCode {
            display: block;
            font-family: var(--mono);
            font-size: .8rem;
            line-height: 1.75;
            color: #a8f0c6;
            white-space: pre-wrap;
            word-break: break-all;
            padding-right: 4rem;
        }

        /* ── Status bar ────────────────────────────── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: .75rem;
            padding: .5rem 1.25rem;
            font-size: .65rem;
            letter-spacing: .1em;
            color: var(--text-muted);
            border-top: 1px solid var(--border);
            background: var(--surface2);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 6px var(--accent);
            animation: pulse 2s ease infinite;
        }

        /* ── Footer ────────────────────────────────── */
        footer {
            margin-top: 3rem;
            text-align: center;
            font-size: .65rem;
            color: var(--text-muted);
            letter-spacing: .1em;
        }

        footer a {
            color: var(--accent-dim);
            text-decoration: none;
        }

        footer a:hover {
            color: var(--accent);
        }

        /* ── Keyframes ─────────────────────────────── */
        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .3;
            }
        }

        /* ── Responsive ────────────────────────────── */
        @media (max-width: 540px) {
            h1 {
                font-size: 1.8rem;
            }

            .lang-btn {
                font-size: .6rem;
            }
        }
    </style>
</head>

<body>

    <div class="grid-bg"></div>

    <div class="page">

        <!-- Header -->
        <header>
            <div class="header-meta">AI-Powered Debugger</div>
            <h1>Code<span>Rescue</span></h1>
            <p class="tagline">// paste broken code → get the fix. powered by gemini 2.5 flash.</p>
        </header>

        <!-- Input Panel -->
        <div class="panel">
            <div class="panel-bar">
                <div class="dot dot-red"></div>
                <div class="dot dot-amber"></div>
                <div class="dot dot-green"></div>
                <span class="panel-title">input.code — select language below</span>
            </div>

            <!-- Language selector -->
            <div class="lang-row" id="langRow">
                <button class="lang-btn active" data-lang="python">python</button>
                <button class="lang-btn" data-lang="javascript">javascript</button>
                <button class="lang-btn" data-lang="typescript">typescript</button>
                <button class="lang-btn" data-lang="java">java</button>
                <button class="lang-btn" data-lang="c">c</button>
                <button class="lang-btn" data-lang="cpp">c++</button>
                <button class="lang-btn" data-lang="csharp">c#</button>
                <button class="lang-btn" data-lang="go">go</button>
                <button class="lang-btn" data-lang="rust">rust</button>
                <button class="lang-btn" data-lang="bash">bash</button>
            </div>

            <textarea id="codeInput" class="code-area"
                placeholder="// paste your broken code here and hit ANALYZE..."></textarea>

            <div class="btn-row">
                <button class="analyze-btn" id="analyzeBtn">
                    <div class="spinner"></div>
                    <span class="btn-text">Analyze &amp; Fix</span>
                </button>
            </div>
        </div>

        <div class="divider">output</div>

        <!-- Output Panel -->
        <div class="panel" id="outputSection">
            <div class="panel-bar">
                <div class="dot dot-red"></div>
                <div class="dot dot-amber"></div>
                <div class="dot dot-green"></div>
                <span class="panel-title" id="outputPanelTitle">result.json</span>
            </div>

            <!-- Bug explanation -->
            <div class="explanation-box">
                <div class="output-label label-bug">
                    <span class="label-icon">⚠</span> bug detected
                </div>
                <p id="errorExplanation"></p>
            </div>

            <!-- Fixed code -->
            <div class="fixed-code-wrap">
                <div class="output-label label-fix">
                    <span class="label-icon">✓</span> fixed code
                </div>
                <button class="copy-btn" id="copyBtn">copy</button>
                <pre><code id="fixedCode"></code></pre>
            </div>

            <div class="status-bar">
                <div class="status-dot"></div>
                <span id="statusText">analysis complete</span>
            </div>
        </div>

        <footer>
            CodeRescue &nbsp;·&nbsp; frontend on <a href="#" target="_blank">GitHub Pages</a> &nbsp;·&nbsp; backend on
            <a href="#" target="_blank">Hugging Face</a>
        </footer>

    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>

</html>
